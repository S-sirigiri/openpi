# FKC guidance config for pi0.5 (pi05_droid_jointpos) with nvblox-ESDF
# collision avoidance.
#
# Pass via the serve_policy CLI:
#   XLA_PYTHON_CLIENT_MEM_FRACTION=0.5 uv run scripts/serve_policy.py \
#       policy:checkpoint \
#       --policy.config=pi05_droid_jointpos \
#       --policy.dir=gs://openpi-assets-simeval/pi05_droid_jointpos \
#       --policy.fkc_config=configs/fkc/placeholder.yaml
#
# When this config is active, the websocket protocol expects each request to
# include the SDF as extra observation keys:
#   obs["fkc/sdf_grid"]      : float16/float32 array (Nx, Ny, Nz)
#   obs["fkc/sdf_origin"]    : float32 (3,) world-frame voxel-(0,0,0) origin
#   obs["fkc/sdf_voxel_size"]: float32 scalar, edge length in metres
# RoboLab's nvblox sidecar (`.venv_nvblox_sidecar`) is the canonical producer.
# `safety_margin` and `softplus_beta` are NOT sent over the wire — this YAML
# is authoritative for them; see `collision:` below.
#
# Change `mode` to switch between guidance schemes. When omitted (or
# `mode: vanilla`) the server behaves identically to baseline pi0.5 and the
# SDF extras are not required.

mode: fkc  # one of: vanilla, linear_combo, fkc

# Leave null to inherit from the model (pi0.5 default: 10).
num_steps: null

# Particles
num_particles: 4          # only used in `fkc` mode
particles_parallel: true

# Scheduling hints
parallel_nn_and_cost: true

# Decoupled objective weights (the user-requested split).
# "value" weights drive the Feynman-Kac log-weight update.
w_cost_value: 0.0         # _L_zero returns 0 today, so this is inert
w_eq_value:   0.0
w_ineq_value: 10.0
# "grad" weights drive the augmented drift (∇J_grad).
w_cost_grad:  0.0
w_eq_grad:    0.0
w_ineq_grad:  1.0

# Gibbs-tilt (β_t). Sign flipped internally so strength > 0 pulls toward low cost.
beta_schedule: constant  # constant | linear_ramp
beta_strength: 7e3

# Flow -> SDE noise injection. IMPORTANT: the drift term for linear_combo / fkc
# is scaled by σ²/2, so sigma_schedule: zero (or sigma_scale: 0) makes both
# guidance modes collapse back to vanilla. Match gr00t's default here: use
# zero_ends (σ_t = α·√(t(1-t))) for a smooth schedule that peaks mid-denoise
# and vanishes at the endpoints.
sigma_schedule: zero_ends  # zero | constant | zero_ends
sigma_scale: 0.25          # α in the zero_ends schedule

# FKC resampling
resample_interval: 1
resample_t_min: 0.05
resample_t_max: 0.95
center_log_weight_increment: true

# Forward kinematics: Franka Panda at the world origin (matches RoboLab's
# BananaInBowlTask scene). Update if another task moves the base.
#
# ee_offset_xyz: 0.01817 m along link8's z-axis is the offset from panda_link8
# (where the FK chain ends) to the Robotiq 2F-85 ``base_link`` (the body whose
# pose RoboLab records). Calibrated against a recorded BananaInBowl episode:
# residual was constant at 0.01817 m to 5 decimals across all 750 timesteps.
fk:
  robot: franka_panda
  base_xyz: [0.0, 0.0, 0.0]
  base_quat_xyzw: [0.0, 0.0, 0.0, 1.0]
  ee_offset_xyz: [0.0, 0.0, 0.01817]
  ee_offset_quat_xyzw: [0.0, 0.0, 0.0, 1.0]

# SDF-based collision-avoidance constraint.
#
# `mode` selects how many points along the robot are queried against the SDF
# each diffusion step. Static at JIT trace time — changing it triggers one
# recompile.
#   - ee_only       : 1 point (just the EE). Fastest, misses arm collisions.
#   - ee_plus_arm   : EE + 3 gripper points + arm_sample_points. Default.
#   - full          : EE + 3 gripper points + full_body_points. Most accurate.
#
# `penalty_type` selects the hinge formula applied to (safety_margin - sdf).
# `safety_margin` (m) is honoured by all four formulas; tune to set the
# clearance threshold. `softplus_beta` is only consulted when
# penalty_type == softplus.
#   - softplus               : softplus(softplus_beta * (m - sdf)) / softplus_beta
#                              Smooth, leaks above the margin. Best gradients.
#   - linear                 : max(0, m - sdf)        — ReLU hinge on violation.
#   - squared_hinge          : max(0, m - sdf)^2      — squared violation.
#   - squared_distance_hinge : max(0, m^2 - sdf^2)    — cylinder-style.
#
# 2 cm is a reasonable starting clearance for the Franka + Robotiq pair on a
# tabletop. Tune down if it prevents close-approach grasps; tune up if the
# robot is brushing obstacles.
collision:
  mode: ee_plus_arm
  penalty_type: squared_hinge  # softplus | linear | squared_hinge | squared_distance_hinge
  safety_margin: 0.0     # tunable for ALL penalty_types
  arm_sample_points: 8
  full_body_points: 30
  softplus_beta: 50.0     # only used when penalty_type == softplus

# Mini physics simulator. ``enabled: true`` rolls each chunk through Isaac
# Lab's implicit-PD law so the constraint sees the trajectory the simulator
# will actually execute (controller lag + joint-position-limit clipping)
# rather than assuming perfect tracking. Verified to match recorded sim joint
# trajectory to 0.002 rad RMS over a 15-step chunk. Defaults match RoboLab's
# DroidCfg (K=400, D=80, sim_dt=1/120, decimation=8).
dynamics:
  enabled: true
  stiffness: 400.0
  damping: 80.0
  sim_dt: 0.008333333333333333  # 1/120 s
  decimation: 8

# Reserved for a future terminal cost. Currently unused (`_L_zero` returns 0)
# but kept in the schema so adding a per-task cost later is a one-line change.
cost:
  target_xyz: [0.55, 0.0, 0.25]
